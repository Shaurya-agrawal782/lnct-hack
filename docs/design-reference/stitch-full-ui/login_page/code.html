<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DisasterConnect - Secure Login</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1;

<!-- Tailwind Config -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed": "#0b1c30",
                        "surface-dim": "#d9d9e5",

                        "on-tertiary-container": "#c5d6f0",
                        "inverse-on-surface": "#f0f0fb",
                        "inverse-primary": "#b7c4ff",
                        "on-surface": "#1a1b23",
                        "error-container": "#ffdad6",
                        "surface-bright": "#faf8ff",
                        "surface": "#faf8ff",
                        "on-tertiary-fixed-variant": "#38485d",
                        "on-background": "#1a1b23",
                        "tertiary-fixed-dim": "#b7c8e1",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed": "#131b2e",
                        "tertiary-fixed": "#d3e4fe",
                        "surface-container-highest": "#e2e1ed",
                        "inverse-surface": "#2e3039",
                        "primary-fixed": "#dce1ff",
                        "primary-container": "#1d4ed8",
                        "secondary-container": "#dae2fd",
                        "on-secondary-container": "#5c647a",
                        "on-error": "#ffffff",
                        "surface-container-low": "#f3f2fe",
                        "outline-variant": "#c4c5d7",
                        "on-tertiary": "#ffffff",
                        "on-primary-container": "#cad3ff",
                        "on-secondary-fixed-variant": "#3f465c",
                        "tertiary": "#36455b",
                        "surface-variant": "#e2e1ed",
                        "secondary": "#565e74",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#4d5d73",
                        "background": "#faf8ff",
                        "on-surface-variant": "#434655",
                        "surface-container-high": "#e8e7f3",
                        "surface-tint": "#2151da",
                        "primary-fixed-dim": "#b7c4ff",
                        "primary": "#0037b0",
                        "secondary-fixed": "#dae2fd",
                        "error": "#ba1a1a",
                        "secondary-fixed-dim": "#bec6e0",
                        "on-primary-fixed": "#001551",
                        "on-primary-fixed-variant": "#0039b5",
                        "on-primary": "#ffffff",
                        "outline": "#747686",
                        "surface-container": "#ededf9"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin-desktop": "32px",
                        "container-max": "1440px",
                        "margin-mobile": "16px",
                        "unit": "8px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "label-sm": ["Inter"],

                        "body-sm": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {

                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "400" }],
                        "body-sm": ["13px", { "lineHeight": "18px", "letterSpacing": "0em", "fontWeight": "400" }],

<body class="bg-surface text-on-surface font-body-md text-body-md antialiased min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Decorative Background Element -->
<div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
<div class="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-surface to-surface-container opacity-50"></div>
<!-- Abstract tactical map graphic representation -->
<div class="absolute inset-0" style="background-image: radial-gradient(#c4c5d7 1px, transparent 1px); background-size: 32px 32px; opacity: 0.15;"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-md px-margin-mobile md:px-0">
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-8 md:p-10 shadow-sm flex flex-col gap-8">
<!-- Branding Header -->
<div class="flex flex-col items-center text-center gap-2">
<div class="w-12 h-12 bg-primary-container text-on-primary-container rounded-full flex items-center justify-center mb-2">
<span class="material-symbols-outlined filled text-[28px]" data-icon="security">security</span>
</div>
<h1 class="font-headline-md text-headline-md font-bold text-primary tracking-tight">DisasterConnect</h1>
<p class="font-body-md text-body-md text-on-surface-variant flex items-center gap-1.5">
<span class="material-symbols-outlined text-[16px]" data-icon="lock">lock</span>
                    Secure Operational Login
                </p>
</div>
<!-- Login Form -->
<form action="#" class="flex flex-col gap-5" method="POST">
<!-- Email Field -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface" for="email">Operational ID / Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="badge">badge</span>
<input autocomplete="email" class="w-full pl-10 pr-3 py-2.5 bg-surface-container-lowest border border-outline rounded-DEFAULT font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/15 transition-all placeholder:text-outline" id="email" name="email" placeholder="Enter your operational ID" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface" for="password">Access Code</label>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="key">key</span>
<input autocomplete="current-password" class="w-full pl-10 pr-3 py-2.5 bg-surface-container-lowest border border-outline rounded-DEFAULT font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/15 transition-all placeholder:text-outline" id="password" name="password" placeholder="Enter your secure access code" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="mt-2 w-full bg-primary hover:bg-on-primary-fixed-variant text-on-primary py-3 rounded-DEFAULT font-label-lg text-label-lg transition-colors flex items-center justify-center gap-2 group" type="submit">
<span>Authenticate</span>
<span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Emergency Contact -->
<div class="pt-6 border-t border-surface-container-highest text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant mb-2">System access failure during critical event?</p>
<a class="inline-flex items-center gap-1.5 font-label-md text-label-md text-error hover:underline" href="#">
<span class="material-symbols-outlined text-[16px]" data-icon="emergency">emergency</span>
                    Contact Emergency Support
                </a>
</div>
</div>
<!-- Footer Legal/Info -->
<div class="mt-8 text-center flex flex-col gap-2">
<p class="font-body-sm text-body-sm text-secondary">
                Authorized Personnel Only. Actions are logged.
            </p>
</div>
</main>
</body></html>
